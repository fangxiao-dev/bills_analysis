version: "3.8"

services:
  api:
    build: .
    image: bills-analysis-app:latest
    ports:
      - "8002:8000"
    env_file:
      - .env.docker  # Create from .env.docker.example and add real API keys
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      FRONTEND_DIST_DIR: "/app/frontend/dist"
      RUN_INLINE_WORKER: "true"
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/healthz", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
